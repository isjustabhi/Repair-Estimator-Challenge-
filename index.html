    html, body { height: 100%; overscroll-behavior: none; }
    body {

      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e2e8f0;
      color: var(--ink);

    input, select, textarea, button { font: inherit; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .mobile-input { font-size: 16px !important; min-height: 48px; }
    .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; scroll-snap-type: x proximity; }
    .scroll-x::-webkit-scrollbar { display: none; }
    .scroll-y { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .safe-bottom { padding-bottom: max(16px, var(--safe-b)); }
    .pt-safe { padding-top: max(8px, var(--safe-t)); }
    #side-panel { transition: transform 0.28s cubic-bezier(.4,0,.2,1); width: min(100vw, 20rem); }
    #app { max-width: 520px; margin: 0 auto; min-height: 100%; background: #f1f5f9; box-shadow: 0 0 0 1px rgba(0,0,0,.04); }

    /* Toolbar + brand */
    .app-toolbar { display: grid; grid-template-columns: 48px 1fr 96px; align-items: center; gap: 2px; min-height: 52px; }
    .app-toolbar-side { display: flex; align-items: center; justify-content: flex-end; }
    .app-brand { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 0; text-align: center; }
    .app-brand-title { color: #fff; font-weight: 800; font-size: 1rem; line-height: 1.15; letter-spacing: -0.02em; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
    .app-brand-sub {
      margin-top: 4px; display: inline-block; padding: 3px 12px; border-radius: 9999px;
      background: linear-gradient(135deg, #ea580c, #f97316); color: #fff;
      font-weight: 800; font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
      box-shadow: 0 2px 10px rgba(234,88,12,.45);
    }
    .touch-target { min-width: 48px; min-height: 48px; display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; }
    .touch-target:active { background: rgba(255,255,255,.08); }

    /* Header hero */
    .hero-total { background: linear-gradient(180deg, #111827 0%, #1f2937 100%); }
    .hero-card {
      margin: 0 12px 12px; padding: 14px 16px; border-radius: 16px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    }
    .hero-amount { font-size: clamp(2.25rem, 9vw, 3rem); font-weight: 800; line-height: 1; letter-spacing: -0.03em; }

    /* Category pills */
    .cat-pills { padding: 10px 12px; gap: 8px; background: #fff; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 20; }
    .cat-pill {
      flex: none; scroll-snap-align: start; padding: 10px 14px; border-radius: 9999px;
      font-size: 0.8125rem; font-weight: 600; white-space: nowrap; border: 2px solid transparent;
      background: #f8fafc; color: #64748b; min-height: 44px;
    }
    .cat-pill.active { background: var(--orange-light); color: var(--orange); border-color: #fdba74; }
    .cat-pill-badge { font-size: 0.65rem; margin-left: 4px; opacity: .85; }

    /* Room chips */
    .room-chips { padding: 8px 12px; gap: 8px; background: #fff; border-bottom: 1px solid #e5e7eb; }
    .room-chip {
      flex: none; display: flex; align-items: center; border-radius: 12px; overflow: hidden;
      border: 2px solid #e5e7eb; background: #fff; min-height: 44px;
    }
    .room-chip.active { border-color: var(--orange); background: var(--orange-light); }
    .room-chip-btn { padding: 10px 12px; font-size: 0.8125rem; font-weight: 600; color: #475569; }
    .room-chip.active .room-chip-btn { color: #c2410c; }

    /* Cards */
    .item-card { border-radius: 16px; margin-bottom: 10px; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
    .item-card.checked { box-shadow: 0 0 0 2px #fed7aa; }
    .check-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 2px solid #d1d5db;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      background: #fff; transition: all .15s;
    }
    .check-btn.on { background: var(--orange); border-color: var(--orange); }
    .group-card { border-radius: 16px; margin-bottom: 10px; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
    .group-head { min-height: 56px; padding: 0 16px; width: 100%; display: flex; align-items: center; justify-content: space-between; text-align: left; }
    .group-head:active { background: #f8fafc; }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: min(100%, 520px); background: #fff; border-top: 1px solid #e5e7eb;
      padding: 10px 12px max(10px, var(--safe-b)); box-shadow: 0 -8px 24px rgba(0,0,0,.08); z-index: 30;
    }
    .nav-btn {
      flex: 1; min-height: 52px; border-radius: 14px; font-weight: 700; font-size: 0.9375rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .nav-btn-primary { background: var(--orange); color: #fff; }
    .nav-btn-secondary { background: #fff; color: var(--orange); border: 2px solid var(--orange); }
    .nav-btn:disabled { opacity: .3; }

    .content-pad { padding: 12px 12px 100px; }
    .section-label { font-size: 0.6875rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: #94a3b8; }
    .add-item-btn {

    .qty-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 12px; }
    .qty-field { flex: 1; min-width: 120px; }

</head>
<body class="bg-slate-100">

<!-- Side panel (lives outside #app so render() never clobbers it) -->
<div id="panel-overlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
<div id="side-panel" class="fixed top-0 left-0 h-full w-72 bg-white z-50 shadow-2xl -translate-x-full flex flex-col">
  <div class="bg-gray-900 text-white px-4 pt-safe pb-4 flex-shrink-0">
    <div class="flex justify-between items-center mt-3">
      <p class="font-bold text-lg">Projects</p>
      <button id="close-panel-btn" class="text-gray-400 text-2xl leading-none">✕</button>
    </div>
  </div>
  <div class="flex-1 overflow-y-auto" id="panel-list"></div>
  <div class="p-4 border-t border-gray-100 flex-shrink-0 safe-bottom">
    <button id="new-project-btn" class="w-full py-3.5 rounded-xl bg-orange-500 text-white font-semibold text-sm">+ New Project</button>
  </div>
</div>

<!-- Settings modal (outside #app) -->
<div id="settings-modal" class="fixed inset-0 z-[60] hidden">
  <div id="settings-bg" class="absolute inset-0 bg-black/60"></div>
  <div class="absolute inset-x-0 bottom-0 pointer-events-auto">
    <div class="bg-white rounded-t-2xl shadow-2xl max-h-[75vh] flex flex-col">

        <h2 class="font-bold text-lg text-gray-900">Settings</h2>
        <button id="settings-close" class="text-gray-400 text-2xl leading-none px-2">✕</button>
      </div>
      <div class="overflow-y-auto flex-1 px-5 py-5 safe-bottom">
        <h3 class="font-semibold text-gray-800 mb-1">Price Schedule</h3>
        <p class="text-sm text-gray-400 mb-4">Upload a CSV to update line-item prices. Only the <code class="bg-gray-100 px-1 rounded text-xs">id</code> and <code class="bg-gray-100 px-1 rounded text-xs">cost</code> columns matter — edit the template, change the numbers, re-upload.</p>
        <div id="price-status" class="mb-4 px-4 py-3 rounded-xl text-sm bg-gray-50 text-gray-500">Using default prices</div>
        <div class="space-y-3">
          <a href="Pricing List.csv" download="Pricing List.csv"
            class="block w-full py-3 rounded-xl border-2 border-gray-200 text-gray-700 font-semibold text-sm text-center">Download Price Template (CSV)</a>
          <label class="w-full block cursor-pointer">
            <span class="block w-full py-3.5 rounded-xl bg-orange-500 text-white font-semibold text-sm text-center">Upload Updated Prices (CSV)</span>
            <input type="file" accept=".csv,.CSV" id="price-csv-input" class="hidden" />
          </label>
          <button id="reset-prices-btn" class="w-full py-3 rounded-xl text-red-400 text-sm font-semibold border-2 border-red-100 hidden">Reset to Default Prices</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Text modal -->
<div id="app-modal" class="fixed inset-0 z-[60] hidden">
  <div id="modal-bg" class="absolute inset-0 bg-black/60"></div>
  <div class="absolute inset-0 flex items-center justify-center p-5 pointer-events-none">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 pointer-events-auto">
      <h3 id="modal-title" class="font-bold text-gray-900 text-lg mb-4">Rename</h3>
      <input id="modal-input" type="text"
        class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-base focus:outline-none focus:border-orange-400 mb-4" />
      <div class="flex gap-3">
        <button id="modal-cancel" class="flex-1 py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold">Cancel</button>
        <button id="modal-confirm" class="flex-1 py-3 rounded-xl bg-orange-500 text-white font-semibold">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Item editor modal -->
<div id="item-modal" class="fixed inset-0 z-[60] hidden">
  <div id="item-modal-bg" class="absolute inset-0 bg-black/60"></div>
  <div class="absolute inset-x-0 bottom-0 pointer-events-auto">
    <div class="bg-white rounded-t-2xl shadow-2xl max-h-[85vh] flex flex-col">
      <div class="px-5 pt-5 pb-3 flex justify-between items-center border-b border-gray-100">
        <h2 id="item-modal-title" class="font-bold text-lg text-gray-900">Add Line Item</h2>
        <button id="item-modal-close" class="text-gray-400 text-2xl leading-none px-2">✕</button>
      </div>
      <div class="overflow-y-auto flex-1 px-5 py-5 space-y-4 safe-bottom">
        <div>
          <label class="text-sm font-medium text-gray-600">Item Name</label>
          <input id="item-modal-name" type="text" class="w-full mt-1 border-2 border-gray-200 rounded-xl px-4 py-3 text-base focus:outline-none focus:border-orange-400" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm font-medium text-gray-600">Unit Cost ($)</label>
            <input id="item-modal-cost" type="number" step="any" min="0" class="w-full mt-1 border-2 border-gray-200 rounded-xl px-4 py-3 text-base focus:outline-none focus:border-orange-400" />
          </div>
          <div>
            <label class="text-sm font-medium text-gray-600">Unit</label>
            <input id="item-modal-unit" type="text" placeholder="ea." class="w-full mt-1 border-2 border-gray-200 rounded-xl px-4 py-3 text-base focus:outline-none focus:border-orange-400" />
          </div>
        </div>
        <p id="item-modal-hint" class="text-xs text-gray-400 hidden"></p>
        <button id="item-modal-save" class="w-full py-3.5 rounded-xl bg-orange-500 text-white font-semibold">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Install banner (outside #app) -->
<div id="install-banner" class="fixed bottom-24 z-50 hidden" style="left:50%;transform:translateX(-50%);width:min(100%,520px);padding:0 12px;">
  <div class="bg-gray-900 text-white rounded-2xl shadow-2xl px-4 py-3 flex items-center gap-3 max-w-lg mx-auto">
    <div class="flex-1 min-w-0">
      <p class="font-semibold text-sm">Install Estimator</p>
      <p class="text-xs text-gray-400 mt-0.5">Add to home screen for offline access</p>
    </div>
    <button id="install-btn" class="px-4 py-2 rounded-xl bg-orange-500 text-white text-sm font-semibold flex-shrink-0">Install</button>
    <button id="install-dismiss" class="text-gray-500 text-xl leading-none flex-shrink-0 px-1">×</button>
  </div>
</div>

<div id="app"></div>

function loadProjectIntoState(proj) {
  state.currentProjectId = proj.id;
  state.currentProjectName = proj.name;
  state.items = proj.items || {};
  state.photos = proj.photos || {};
  state.projectPriceOverrides = proj.projectPriceOverrides || {};
  state.customItems = proj.customItems || [];
  state.hiddenItems = proj.hiddenItems || [];
  state.deal = proj.deal || { arv: '', purchase: '', holding: '' };
  state.roomInstances = proj.roomInstances || {
    bathroom: proj.bathroomInstances || DEFAULT_ROOMS.bathroom,
    bedroom: DEFAULT_ROOMS.bedroom,
    living: DEFAULT_ROOMS.living,
  };
  if (!state.roomInstances.bedroom) state.roomInstances.bedroom = [...DEFAULT_ROOMS.bedroom];
  if (!state.roomInstances.living) state.roomInstances.living = [...DEFAULT_ROOMS.living];
  state.currentRoom = { bathroom: 0, bedroom: 0, living: 0 };
  state.currentCat = 0;
  state.showSummary = false;
  // Migrate legacy bathroom keys (b1:ba-01 → bathroom:b1:ba-01)
  Object.keys({ ...state.items }).forEach(key => {
    const parts = key.split(':');
    if (parts.length === 2 && !['bathroom', 'bedroom', 'living'].includes(parts[0])) {
      const nk = `bathroom:${parts[0]}:${parts[1]}`;
      if (!state.items[nk]) state.items[nk] = state.items[key];
      delete state.items[key];
    }
  });
  CATEGORIES.forEach(cat => {
    if (cat.type === 'multi') {
      state.roomInstances[cat.roomType].forEach(room => {
        cat.items.forEach(item => {
          const k = roomKey(cat.roomType, room.id, item.id);
          if (!state.items[k]) state.items[k] = blankItemState();
        });
      });
    } else {
      cat.items.forEach(item => { if (!state.items[item.id]) state.items[item.id] = blankItemState(); });
    }
  });
}

function fmtTotal(n) { return '$' + Math.round(n).toLocaleString('en-US'); }

function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return ''; }
}

function getItemCost(item, stateKey) {
  if (stateKey && state.projectPriceOverrides[stateKey] !== undefined) return state.projectPriceOverrides[stateKey];
  if (state.projectPriceOverrides[item.id] !== undefined) return state.projectPriceOverrides[item.id];
  const ov = state.priceOverrides[item.id];
  return ov !== undefined ? ov : item.cost;
}

function parseCsvLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else cur += c;
  }
  result.push(cur.trim()); return result;
}
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = parseCsvLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseCsvLine(line);
    return Object.fromEntries(headers.map((h, i) => [h.trim(), vals[i] ?? '']));
  });
}

function findItemDef(id) {
  const parsed = parseStateKey(id);
  const itemId = parsed.itemId || id;
  const custom = state.customItems.find(c => c.id === itemId);
  if (custom) return custom;
  if (parsed.roomType) {
    const cat = getMultiCat(parsed.roomType);
    return cat?.items.find(i => i.id === itemId) || ITEM_MAP[itemId] || null;
  }
  return ITEM_MAP[id] || null;
}

function calcItem(item, s, stateKey) {
  if (!s || !s.checked) return 0;
  const q = parseFloat(s.qty);
  if (!q || q <= 0) return 0;
  const raw = q * getItemCost(item, stateKey || item.id);
  return item.min ? Math.max(raw, item.min) : raw;
}

function calcRoomTotal(cat, room) {
  let total = 0;
  cat.items.forEach(item => {
    if (state.hiddenItems.includes(item.id)) return;
    const k = roomKey(cat.roomType, room.id, item.id);
    total += calcItem(item, state.items[k], k);
  });
  state.customItems.filter(c => c.categoryId === cat.id && c.roomId === room.id).forEach(c => {
    const k = roomKey(cat.roomType, room.id, c.id);
    total += calcItem(c, state.items[k], k);
  });
  return total;
}

function calcCategoryTotal(cat) {
  if (cat.type === 'multi') {
    return state.roomInstances[cat.roomType].reduce((t, room) => t + calcRoomTotal(cat, room), 0);
  }
  let total = 0;
  cat.items.forEach(item => {
    if (state.hiddenItems.includes(item.id)) return;
    total += calcItem(item, state.items[item.id], item.id);
  });
  state.customItems.filter(c => c.categoryId === cat.id && !c.roomId).forEach(c => {
    total += calcItem(c, state.items[c.id], c.id);
  });
  return total;
}

function calcRunningTotal() { return CATEGORIES.reduce((t, cat) => t + calcCategoryTotal(cat), 0); }

function calcProgressUnits() {
  let total = 0, checked = 0;
  for (const cat of CATEGORIES) {
    const groupIds = CAT_GROUPS[cat.id] || [];
    if (cat.type === 'multi') {
      for (const room of state.roomInstances[cat.roomType]) {
        for (const gid of groupIds) {
          total++;
          const g = GROUPS[gid];
          const anyChecked = g.ids.some(id => {
            if (state.hiddenItems.includes(id)) return false;
            return state.items[roomKey(cat.roomType, room.id, id)]?.checked;
          });
          if (anyChecked) checked++;
        }
      }
    } else {
      for (const gid of groupIds) {
        total++;
        const g = GROUPS[gid];
        if (g.ids.some(id => !state.hiddenItems.includes(id) && state.items[id]?.checked)) checked++;
      }
      cat.items.forEach(item => {
        const inGroup = groupIds.some(gid => GROUPS[gid].ids.includes(item.id));
        if (!inGroup && !item.noAction && !state.hiddenItems.includes(item.id)) {
          total++;
          if (state.items[item.id]?.checked) checked++;
        }
      });
    }
  }
  return { total, checked };
}

function checkedCount(cat) {
  if (cat.type === 'multi') {
    return state.roomInstances[cat.roomType].reduce((t, room) =>
      t + cat.items.filter(item => state.items[roomKey(cat.roomType, room.id, item.id)]?.checked).length, 0);
  }
  return cat.items.filter(item => state.items[item.id]?.checked).length;
}

let pendingModal = null;

function openModal(title, placeholder, defaultVal, onConfirm) {
  pendingModal = onConfirm;
  document.getElementById('modal-title').textContent = title;
  const inp = document.getElementById('modal-input');
  inp.placeholder = placeholder || '';
  inp.value = defaultVal || '';
  document.getElementById('app-modal').classList.remove('hidden');
  setTimeout(() => { inp.focus(); inp.select(); }, 50);
}

function confirmModal() {
  const val = document.getElementById('modal-input').value.trim();
  if (val && pendingModal) pendingModal(val);
  closeModal();
}

function closeModal() {
  document.getElementById('app-modal').classList.add('hidden');
  pendingModal = null;
}

function refreshPanelList() {
  const list = loadProjects();
  const panelList = document.getElementById('panel-list');
  panelList.innerHTML = list.length === 0
    ? '<p class="text-center text-gray-400 text-sm py-10">No saved projects</p>'
    : list.map(p => {
        const isActive = p.id === state.currentProjectId;
        const safeName = p.name.replace(/"/g, '&quot;');
        return `<div class="border-b border-gray-50 flex items-stretch ${isActive ? 'bg-orange-50' : ''}">
          <button class="panel-proj-btn flex-1 text-left px-4 py-4" data-proj-id="${p.id}">
            <p class="font-semibold text-sm ${isActive ? 'text-orange-700' : 'text-gray-900'}">${p.name}</p>
            <p class="text-xs text-gray-400 mt-0.5">${fmtDate(p.savedAt)}</p>
            ${isActive ? '<span class="text-orange-400 text-xs font-medium block mt-1">Active</span>' : ''}
          </button>
          <div class="flex flex-col justify-center gap-1 pr-3">
            <button class="panel-rename-btn p-2 rounded-lg text-gray-400" data-proj-id="${p.id}" data-proj-name="${safeName}" title="Rename">${PENCIL}</button>
            ${!isActive ? `<button class="panel-delete-btn p-2 rounded-lg text-red-300" data-proj-id="${p.id}" data-proj-name="${safeName}" title="Delete">${TRASH}</button>` : ''}
          </div>
        </div>`;
      }).join('');

  panelList.querySelectorAll('.panel-proj-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.projId;
      if (id === state.currentProjectId) { closePanel(); return; }
      saveCurrentState();
      const proj = loadProjects().find(p => p.id === id);
      if (proj) { loadProjectIntoState(proj); render(); closePanel(); }
    });
  });

  panelList.querySelectorAll('.panel-rename-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.projId;
      openModal('Rename Project', 'e.g. 123 Main St', btn.dataset.projName, name => {
        const saved = loadProjects();
        const proj = saved.find(p => p.id === id);
        if (proj) {
          proj.name = name;
          saveProjects(saved);
          if (id === state.currentProjectId) { state.currentProjectName = name; render(); }
        }
        refreshPanelList();
      });
    });
  });

  panelList.querySelectorAll('.panel-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.projId;
      if (!confirm(`Delete "${btn.dataset.projName}"? This cannot be undone.`)) return;
      saveProjects(loadProjects().filter(p => p.id !== id));
      refreshPanelList();
    });
  });
}

function buildSlots(cat, roomId) {
  const groupIds = CAT_GROUPS[cat.id] || [];
  const itemById = {};
  cat.items.forEach(i => { if (!state.hiddenItems.includes(i.id)) itemById[i.id] = i; });
  const groupedIds = new Set();
  const slots = [];
  const roomType = cat.roomType;
  for (const gid of groupIds) {
    const g = GROUPS[gid];
    const entries = g.ids.map(id => {
      const item = itemById[id] || (id.includes('-nan-') ? cat.items.find(i => i.id === id) : null);
      if (!item || state.hiddenItems.includes(id)) return null;
      groupedIds.add(id);
      const stateId = roomId ? roomKey(roomType, roomId, id) : id;
      return { item, stateId };
    }).filter(Boolean);
    if (entries.length) slots.push({ type: 'group', gid, label: g.label, entries });
  }
  cat.items.forEach(item => {
    if (groupedIds.has(item.id) || item.noAction || state.hiddenItems.includes(item.id)) return;
    slots.push({ type: 'standalone', item, stateId: roomId ? roomKey(roomType, roomId, item.id) : item.id });
  });
  state.customItems.filter(c => c.categoryId === cat.id && (roomId ? c.roomId === roomId : !c.roomId)).forEach(c => {
    slots.push({ type: 'standalone', item: c, stateId: roomId ? roomKey(roomType, roomId, c.id) : c.id });
  });
  return slots;
}

function renderGroup(slot) {
  const { gid, label, entries } = slot;
  const isExpanded = state.expandedGroups.includes(gid);
  const checkedInGroup = entries.filter(e => state.items[e.stateId]?.checked).length;
  const groupTotal = entries.reduce((sum, e) => sum + calcItem(e.item, state.items[e.stateId], e.stateId), 0);
  const chevron = isExpanded
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>`;
  return `
    <div data-group-card data-gid="${gid}" class="group-card ${checkedInGroup > 0 ? 'ring-2 ring-orange-100' : ''}">
      <button data-action="toggle-group" data-gid="${gid}" class="group-head">
        <div class="flex items-center gap-3 min-w-0">
          <span class="text-gray-400 flex-shrink-0">${chevron}</span>
          <span class="font-bold text-base text-gray-800">${label}</span>
          ${checkedInGroup > 0 ? `<span class="text-xs px-2.5 py-1 bg-orange-100 text-orange-700 rounded-full font-bold">${checkedInGroup} ✓</span>` : ''}
        </div>
        <span data-group-total class="font-bold text-lg flex-shrink-0 ml-2 ${groupTotal > 0 ? 'text-orange-600' : 'text-gray-300'}">${groupTotal > 0 ? fmtTotal(groupTotal) : '—'}</span>
      </button>
      ${isExpanded ? `<div class="border-t border-gray-100 px-3 pb-3 pt-2 space-y-2">
        ${entries.map(e => renderLineItem(e.item, e.stateId, true)).join('')}
      </div>` : ''}
    </div>`;
}

function getCheckedRows(cat, room) {
  const rows = [];
  const addRow = (item, stateKey) => {
    const s = state.items[stateKey];
    if (!s?.checked || !(parseFloat(s.qty) > 0)) return;
    rows.push({ item, s, stateKey, t: calcItem(item, s, stateKey) });
  };
  if (cat.type === 'multi') {
    cat.items.forEach(item => {
      if (state.hiddenItems.includes(item.id)) return;
      addRow(item, roomKey(cat.roomType, room.id, item.id));
    });
    state.customItems.filter(c => c.categoryId === cat.id && c.roomId === room.id).forEach(c => {
      addRow(c, roomKey(cat.roomType, room.id, c.id));
    });
  } else {
    cat.items.forEach(item => {
      if (state.hiddenItems.includes(item.id)) return;
      addRow(item, item.id);
    });
    state.customItems.filter(c => c.categoryId === cat.id && !c.roomId).forEach(c => addRow(c, c.id));
  }
  return rows;
}

function calcDealMetrics() {
  const repairs = calcRunningTotal();
  const arv = parseFloat(state.deal.arv) || 0;
  const purchase = parseFloat(state.deal.purchase) || 0;
  const holding = parseFloat(state.deal.holding) || 0;
  const totalCost = purchase + repairs + holding;
  const profit = arv - totalCost;
  const margin = arv > 0 ? (profit / arv) * 100 : 0;
  return { repairs, arv, purchase, holding, totalCost, profit, margin };
}

async function tryOcrSerial(stateId, dataUrl) {
  try {
    const { data: { text } } = await Tesseract.recognize(dataUrl, 'eng', { logger: () => {} });
    const cleaned = text.replace(/\s+/g, ' ').trim();
    const yearMatch = cleaned.match(/\b(19|20)\d{2}\b/);
    const serialMatch = cleaned.match(/[A-Z0-9]{8,}/);
    if (!state.items[stateId]) state.items[stateId] = blankItemState();
    if (yearMatch) state.items[stateId].year = yearMatch[0];
    if (serialMatch || yearMatch) {
      state.items[stateId].serialHint = (serialMatch?.[0] || yearMatch[0]).slice(0, 24);
      scheduleSave();
      render();
    }
  } catch {}
}

// ============================================================
// PHOTO COMPRESSION
// ============================================================
function compressImage(file, maxDim = 1600, quality = 0.82) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(maxDim / img.width, maxDim / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ============================================================
// EXCEL / ZIP EXPORT
// ============================================================
async function exportPackage() {
  if (typeof XLSX === 'undefined') { alert('Export library not loaded. Check your internet connection.'); return; }
  if (typeof JSZip === 'undefined') { alert('ZIP library not loaded. Check your internet connection.'); return; }

  const wb = XLSX.utils.book_new();
  const ws = {};
  let row = 0;
  const merges = [];
  const colWidths = [38, 16, 12, 10, 14];

  const s = (font, fill, align, border) => ({
    font: { name: 'Calibri', ...font },
    fill: fill ? { patternType: 'solid', fgColor: { rgb: fill } } : undefined,
    alignment: { wrapText: false, ...align },
    border: border || undefined,
  });

  const cell = (r, c, v, style, fmt) => {
    const addr = XLSX.utils.encode_cell({ r, c });
    ws[addr] = { v, t: typeof v === 'number' ? 'n' : 's', s: style };
    if (fmt) ws[addr].z = fmt;
  };
  const merge = (r, c1, c2) => merges.push({ s: { r, c: c1 }, e: { r, c: c2 } });

  // Title
  cell(row, 0, 'SPARK EQUITY GROUP — REPAIR ESTIMATE',
    s({ bold: true, sz: 14, color: { rgb: 'FFFFFF' } }, '111827', { horizontal: 'center', vertical: 'center' }));
  merge(row, 0, 4); row++;

  cell(row, 0, `Property: ${state.currentProjectName}     Date: ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`,
    s({ sz: 10, color: { rgb: '6B7280' } }, 'F9FAFB', { horizontal: 'center' }));
  merge(row, 0, 4); row++;
  row++; // blank

  const thinBorder = (col) => ({ top: { style: 'thin', color: { rgb: col } }, bottom: { style: 'thin', color: { rgb: col } }, left: { style: 'thin', color: { rgb: col } }, right: { style: 'thin', color: { rgb: col } } });

  const processSection = (label, rows) => {
    if (!rows.length) return;
    // Section header
    cell(row, 0, label.toUpperCase(), s({ bold: true, sz: 11, color: { rgb: 'FFFFFF' } }, 'EA580C', { vertical: 'center' }));
    for (let c = 1; c < 5; c++) cell(row, c, '', s({}, 'EA580C'));
    merge(row, 0, 4); row++;

    // Column headers
    ['Repair Item','Unit','Unit Cost','Qty','Estimate'].forEach((h, c) =>
      cell(row, c, h, s({ bold: true, sz: 10, color: { rgb: '374151' } }, 'FFF7ED', { horizontal: c >= 2 ? 'right' : 'left' }, thinBorder('FDBA74'))));
    row++;

    let secTotal = 0;
    rows.forEach(({ item, s: st, t, stateKey }) => {
      const rowStyle = s({ sz: 10, color: { rgb: '374151' } }, 'FFFFFF', {}, thinBorder('F3F4F6'));
      const yearStr = item.hasYear && st.year ? ` (${st.year})` : '';
      cell(row, 0, item.name + yearStr, rowStyle);
      cell(row, 1, item.unit, rowStyle);
      cell(row, 2, getItemCost(item, stateKey || item.id), s({ sz: 10 }, 'FFFFFF', { horizontal: 'right' }, thinBorder('F3F4F6')), '"$"#,##0.00');
      cell(row, 3, parseFloat(st.qty) || 0, s({ sz: 10 }, 'FFFFFF', { horizontal: 'right' }, thinBorder('F3F4F6')));
      cell(row, 4, t, s({ sz: 10 }, 'FFFFFF', { horizontal: 'right' }, thinBorder('F3F4F6')), '"$"#,##0');
      secTotal += t; row++;
    });

    // Section total row
    const totStyle = s({ bold: true, sz: 10, color: { rgb: 'C2410C' } }, 'FFF7ED', {}, thinBorder('FDBA74'));
    cell(row, 0, `${label} Total`, totStyle); merge(row, 0, 3);
    for (let c = 1; c < 4; c++) cell(row, c, '', totStyle);
    cell(row, 4, secTotal, s({ bold: true, sz: 10, color: { rgb: 'C2410C' } }, 'FFF7ED', { horizontal: 'right' }, thinBorder('FDBA74')), '"$"#,##0');
    row++;
    row++; // blank
  };

  CATEGORIES.forEach(cat => {
    if (cat.type === 'multi') {
      state.roomInstances[cat.roomType].forEach(room => {
        const rows = getCheckedRows(cat, room);
        processSection(room.name, rows.map(r => ({ ...r, s: r.s, t: r.t })));
      });
    } else {
      const rows = getCheckedRows(cat, null);
      processSection(cat.name, rows);
    }
  });

  // Grand total
  const grand = calcRunningTotal();
  cell(row, 0, 'TOTAL ESTIMATE', s({ bold: true, sz: 13, color: { rgb: 'FFFFFF' } }, '111827', { horizontal: 'center', vertical: 'center' }));
  merge(row, 0, 3);
  for (let c = 1; c < 4; c++) cell(row, c, '', s({}, '111827'));
  cell(row, 4, grand, s({ bold: true, sz: 13, color: { rgb: 'FFFFFF' } }, '111827', { horizontal: 'right', vertical: 'center' }), '"$"#,##0');

  ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: row, c: 4 } });
  ws['!cols'] = colWidths.map(w => ({ wch: w }));
  ws['!merges'] = merges;
  ws['!rows'] = Array.from({ length: row + 1 }, (_, i) => ({ hpt: i === 0 ? 24 : i === 1 ? 16 : 18 }));

  XLSX.utils.book_append_sheet(wb, ws, 'Estimate');
  const baseName = `Repair-Estimate-${state.currentProjectName.replace(/[^a-z0-9]/gi,'_')}-${new Date().toISOString().split('T')[0]}`;

  const photoEntries = Object.entries(state.photos || {}).filter(([, arr]) => arr?.length > 0);
  const zip = new JSZip();
  zip.file(`${baseName}.xlsx`, XLSX.write(wb, { bookType: 'xlsx', type: 'array' }));
  if (photoEntries.length) {
    const folder = zip.folder('photos');
    photoEntries.forEach(([stateId, photos]) => {
      const def = findItemDef(stateId);
      const prefix = (def?.name || stateId).replace(/[^a-z0-9]/gi, '_');
      photos.forEach((ph, i) => {
        const ext = (ph.dataUrl.split(';')[0].split('/')[1] || 'jpg').replace('jpeg', 'jpg');
        folder.file(`${prefix}_${i + 1}.${ext}`, ph.dataUrl.split(',')[1], { base64: true });
      });
    });
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${baseName}.zip`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

document.body.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'open-panel')       { openPanel(); return; }
  if (action === 'open-settings')    { openSettings(); return; }
  if (action === 'export-excel')     { exportPackage(); return; }

  if (action === 'toggle-item') {
    const id = btn.dataset.id;
    const s = state.items[id];
    const itemDef = findItemDef(id);
    s.checked = !s.checked;
    if (!s.checked) {
      s.qty = '';
    } else if (!s.qty && itemDef?.defaultQty) {
      s.qty = String(itemDef.defaultQty);
    }
    saveCurrentState(); render();
    if (s.checked) document.querySelector(`[data-action="update-qty"][data-id="${id}"]`)?.focus();
    return;
  }
  if (action === 'switch-cat') {
    state.currentCat = parseInt(btn.dataset.index);
    render();
    document.getElementById('scroll-area')?.scrollTo(0,0);
    return;
  }
  if (action === 'prev-cat') {
    state.currentCat = Math.max(0, state.currentCat - 1);
    render(); document.getElementById('scroll-area')?.scrollTo(0,0); return;
  }
  if (action === 'next-cat') {
    state.currentCat = Math.min(CATEGORIES.length - 1, state.currentCat + 1);
    render(); document.getElementById('scroll-area')?.scrollTo(0,0); return;
  }
  if (action === 'toggle-group') {
    const gid = btn.dataset.gid;
    const scrollEl = document.getElementById('scroll-area');
    const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
    const idx = state.expandedGroups.indexOf(gid);
    if (idx >= 0) state.expandedGroups.splice(idx, 1); else state.expandedGroups.push(gid);
    render();
    if (scrollEl) requestAnimationFrame(() => document.getElementById('scroll-area')?.scrollTo(0, scrollTop));
    return;
  }
  if (action === 'switch-room') {
    const rt = btn.dataset.roomType;
    state.currentRoom[rt] = parseInt(btn.dataset.index);
    render(); document.getElementById('scroll-area')?.scrollTo(0,0); return;
  }
  if (action === 'edit-room-name') {
    const rt = btn.dataset.roomType;
    const idx = parseInt(btn.dataset.index);
    const cat = getMultiCat(rt);
    const label = cat?.name?.slice(0, -1) || 'Room';
    openModal(`Rename ${label}`, `e.g. Master ${label}`, state.roomInstances[rt][idx].name, name => {
      state.roomInstances[rt][idx].name = name;
      saveCurrentState(); render();
    });
    return;
  }
  if (action === 'add-room') {
    const rt = btn.dataset.roomType;
    const cat = getMultiCat(rt);
    const id = `${rt[0]}${Date.now()}`;
    const name = `${cat.name.replace(/s$/, '')} ${state.roomInstances[rt].length + 1}`;
    const room = { id, name };
    state.roomInstances[rt].push(room);
    initRoomItems(cat, room);
    state.currentRoom[rt] = state.roomInstances[rt].length - 1;
    saveCurrentState(); render(); return;
  }
  if (action === 'remove-room') {
    const rt = btn.dataset.roomType;
    const idx = parseInt(btn.dataset.index);
    const cat = getMultiCat(rt);
    const room = state.roomInstances[rt][idx];
    if (!confirm(`Remove "${room.name}"? All entries will be lost.`)) return;
    cat.items.forEach(item => { delete state.items[roomKey(rt, room.id, item.id)]; });
    state.customItems = state.customItems.filter(c => c.roomId !== room.id);
    state.roomInstances[rt].splice(idx, 1);
    state.currentRoom[rt] = Math.min(state.currentRoom[rt], state.roomInstances[rt].length - 1);
    saveCurrentState(); render(); return;
  }
  if (action === 'edit-price') {
    const id = btn.dataset.id;
    const item = findItemDef(id);
    if (!item) return;
    const cur = getItemCost(item, id);
    openModal('Edit Unit Cost', 'e.g. 125.00', String(cur), val => {
      const cost = parseFloat(val);
      if (!isNaN(cost) && cost >= 0) {
        state.projectPriceOverrides[id] = cost;
        saveCurrentState(); render();
      }
    });
    return;
  }
  if (action === 'delete-item') {
    const itemId = btn.dataset.itemId;
    const id = btn.dataset.id;
    const item = findItemDef(id);
    if (item?.custom) {
      state.customItems = state.customItems.filter(c => c.id !== itemId);
      delete state.items[id];
    } else if (!state.hiddenItems.includes(itemId)) {
      state.hiddenItems.push(itemId);
    }
    saveCurrentState(); render(); return;
  }
  if (action === 'add-custom-item') {
    openItemModal({ catId: btn.dataset.catId, roomId: btn.dataset.roomId || null });
    return;
  }
  if (action === 'rename-project') {
    openModal('Rename Project', 'e.g. 123 Main St', state.currentProjectName, name => {
      state.currentProjectName = name;
      saveCurrentState();
      render();
    });
    return;
  }
  if (action === 'add-photo') {
    const id = btn.dataset.id;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.style.cssText = 'position:fixed;top:-999px;opacity:0';
    document.body.appendChild(input);   // must be in DOM or Android drops the event
    input.onchange = async () => {
      document.body.removeChild(input);
      if (!input.files || !input.files.length) return;
      if (!state.photos[id]) state.photos[id] = [];
      for (const file of Array.from(input.files)) {
        const dataUrl = await compressImage(file);
        state.photos[id].push({ name: file.name, dataUrl });
        if (btn.dataset.hasYear === '1' && typeof Tesseract !== 'undefined') {
          tryOcrSerial(id, dataUrl);
        }
      }
      saveCurrentState(); render();
    };
    input.click();
    return;
  }
  if (action === 'remove-photo') {
    const id = btn.dataset.id;
    const idx = parseInt(btn.dataset.index);
    if (state.photos[id]) state.photos[id].splice(idx, 1);
    scheduleSave(); render();
    return;
  }
  if (action === 'show-summary')  { state.showSummary = true;  saveCurrentState(); render(); return; }
  if (action === 'back-to-edit')  { state.showSummary = false; render(); return; }
  if (action === 'reset') {
    if (!confirm('Start a new estimate? All entries will be cleared.')) return;
    state.roomInstances = JSON.parse(JSON.stringify(DEFAULT_ROOMS));
    state.currentRoom = { bathroom: 0, bedroom: 0, living: 0 };
    state.currentCat = 0;
    state.showSummary = false;
    initState();
    saveCurrentState(); render(); return;
  }
});

document.getElementById('reset-prices-btn').addEventListener('click', () => {
  if (!confirm('Reset all prices to defaults?')) return;
  state.priceOverrides = {};
  savePriceOverrides();
  refreshPriceStatus();
  render();
});

// Modal buttons (outside #app, bound once)
document.getElementById('modal-confirm').addEventListener('click', confirmModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', closeModal);
document.getElementById('modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmModal();
  if (e.key === 'Escape') closeModal();
});

// ============================================================
// PARTIAL UPDATE (avoids full re-render on qty input)
// ============================================================
function updateTotalsInPlace(changedId) {
  const itemDef = findItemDef(changedId);
  if (!itemDef) return;
  const s = state.items[changedId];
  const t = calcItem(itemDef, s, changedId);

  const toggleBtn = document.querySelector(`[data-action="toggle-item"][data-id="${changedId}"]`);
  const card = toggleBtn?.closest('[data-item-card]');
  if (card) {
    const el = card.querySelector('.font-bold.text-base:not(.flex-shrink-0)') || card.querySelectorAll('.font-bold.text-base')[1];
    if (el) { el.textContent = t > 0 ? fmtTotal(t) : '—'; el.className = `font-bold text-base ${t > 0 ? 'text-orange-600' : 'text-gray-200'}`; }
  }
  const groupCard = toggleBtn?.closest('[data-group-card]');
  if (groupCard) {
    const gid = groupCard.dataset.gid;
    const group = GROUPS[gid];
    if (group) {
      const parts = changedId.split(':');
      const isRoom = parts.length === 3;
      const groupTotal = group.ids.reduce((sum, id) => {
        const sid = isRoom ? `${parts[0]}:${parts[1]}:${id}` : id;
        const def = findItemDef(sid);
        return sum + (def && state.items[sid] ? calcItem(def, state.items[sid], sid) : 0);
      }, 0);
      const totalEl = groupCard.querySelector('[data-group-total]');
      if (totalEl) {
        totalEl.textContent = groupTotal > 0 ? fmtTotal(groupTotal) : '—';
        totalEl.className = `font-bold text-base flex-shrink-0 ml-2 ${groupTotal > 0 ? 'text-orange-600' : 'text-gray-200'}`;
      }
    }
  }

  const hdr = document.querySelector('.text-5xl.font-bold');
  if (hdr) hdr.textContent = fmtTotal(calcRunningTotal());

  const cat = CATEGORIES[state.currentCat];
  const ct = calcCategoryTotal(cat);
  const tabSpan = document.querySelector(`[data-action="switch-cat"][data-index="${state.currentCat}"] span`);
  if (tabSpan) tabSpan.textContent = ct > 0 ? fmtTotal(ct) : '';

  const secEl = document.querySelector('.text-xs.text-gray-400.mt-1\\.5.truncate');
  if (secEl) {
    const n = CATEGORIES.filter(c => calcCategoryTotal(c) > 0).length;
    secEl.textContent = `${state.currentProjectName} · ${n} active section${n !== 1 ? 's' : ''}`;
  }
}

// ============================================================
// PWA INSTALL
// ============================================================
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (!localStorage.getItem('installDismissed')) {
    document.getElementById('install-banner')?.classList.remove('hidden');
  }
});
document.getElementById('install-btn')?.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  document.getElementById('install-banner')?.classList.add('hidden');
});
document.getElementById('install-dismiss')?.addEventListener('click', () => {
  localStorage.setItem('installDismissed', '1');
  document.getElementById('install-banner')?.classList.add('hidden');
});

// ============================================================
// BOOT
// ============================================================
(function boot() {
  state.priceOverrides = loadPriceOverrides();
  const projects = loadProjects();
  if (projects.length > 0) {
    loadProjectIntoState(projects[0]);
  } else {
    state.currentProjectId = `proj_${Date.now()}`;
    state.currentProjectName = 'New Estimate';
    initState();
    saveCurrentState();
  }
  render();
  window.addEventListener('visibilitychange', () => { if (document.hidden) saveCurrentState(); });
  window.addEventListener('pagehide', saveCurrentState);
  window.addEventListener('freeze', saveCurrentState);
})();
</script>
